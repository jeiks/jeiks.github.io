name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Altere para "master" se sua branch principal tiver esse nome

# Permissões necessárias para o GitHub Actions fazer deploy no Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout seu repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm # Altere para pnpm, yarn ou bun se usar outro gerenciador

      - name: Instalar dependências
        run: npm ci # Ou 'yarn install', 'pnpm install'

      - name: Build do Astro
        run: npm run build # Executa o build que gera a pasta dist/

      - name: Upload dos arquivos compilados
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # O Astro gera os arquivos estáticos aqui por padrão

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
